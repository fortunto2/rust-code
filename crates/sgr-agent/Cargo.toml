[package]
name = "sgr-agent"
version = "0.1.0"
edition = "2021"
description = "SGR LLM client + agent framework — structured output, function calling, agent loop, 3 agent variants"
license = "MIT"
repository = "https://github.com/fortunto2/rust-code"
keywords = ["llm", "structured-output", "function-calling", "sgr", "gemini"]
categories = ["development-tools"]

[features]
default = ["gemini", "openai"]
gemini = []
openai = []
agent = ["async-trait", "indexmap", "futures", "tokio-util"]
genai = ["dep:genai", "async-trait"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
tokio = { version = "1", features = ["rt", "macros", "sync", "time"] }
strsim = "0.11"
thiserror = "2"
tracing = "0.1"
async-trait = { version = "0.1", optional = true }
indexmap = { version = "2", optional = true }
futures = { version = "0.3", optional = true }
tokio-util = { version = "0.7", optional = true }
genai = { path = "../genai", optional = true }

# Uniffi for iOS/Android Swift/Kotlin bindings (optional)
# uniffi = { version = "0.31", optional = true }

[dev-dependencies]
base64 = "0.22"
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
async-trait = "0.1"

[[example]]
name = "agent_demo"
required-features = ["agent", "gemini"]
